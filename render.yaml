# Render Blueprint — single Web Service (API + frontend on one URL).
# Dashboard: New > Blueprint > connect this repository.

services:
  - type: web
    name: testsite
    runtime: node
    plan: free
    buildCommand: npm run build:render
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
