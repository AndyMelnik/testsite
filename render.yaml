# Render Blueprint — single Web Service (API + frontend on one URL).
# Dashboard: New > Blueprint > connect this repository.

services:
  - type: web
    name: testsite
    runtime: node
    plan: free
    buildCommand: npm install --prefix backend && npm install --prefix frontend && npm run build --prefix frontend
    startCommand: npm start --prefix backend
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
