# Render Blueprint — deploy both services from one GitHub repo.
# Dashboard: New > Blueprint > connect this repository.

services:
  # Backend API (Web Service)
  - type: web
    name: threadline-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        fromService:
          type: web
          name: threadline-store
          envVarKey: RENDER_EXTERNAL_URL

  # Frontend (Web Service)
  - type: web
    name: threadline-store
    runtime: node
    rootDir: frontend
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        fromService:
          type: web
          name: threadline-api
          envVarKey: RENDER_EXTERNAL_URL
